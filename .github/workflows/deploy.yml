name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Get EC2 IPs from Terraform state
        run: |
          cd infrastructure/terraform/environments/dev
          terraform init -reconfigure
          echo "INSTANCE_IPS=$(terraform output -json instance_public_ips)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Get DB endpoint and SQS URL
        run: |
          cd infrastructure/terraform/environments/dev
          echo "DB_ENDPOINT=$(terraform output -raw db_endpoint)" >> $GITHUB_ENV
          echo "SQS_QUEUE_URL=$(terraform output -raw sqs_queue_url)" >> $GITHUB_ENV

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy-key.pem
          chmod 600 /tmp/deploy-key.pem

      - name: Update Ansible inventory
        run: |
          cat > ansible/inventory/hosts << EOF
          [app_servers]
          $(echo $INSTANCE_IPS | jq -r '.[] | "app ansible_host=" + .')

          [app_servers:vars]
          ansible_user=ec2-user
          ansible_ssh_private_key_file=/tmp/deploy-key.pem
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible - Install Docker
        continue-on-error: true
        run: |
          ansible-playbook -i ansible/inventory/hosts ansible/playbooks/install-docker.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Run Ansible - Deploy services
        continue-on-error: true
        run: |
          ansible-playbook -i ansible/inventory/hosts ansible/playbooks/deploy.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_ENDPOINT: ${{ env.DB_ENDPOINT }}
          SQS_QUEUE_URL: ${{ env.SQS_QUEUE_URL }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}